name: Android APK (fork)

# Fork-owned. Builds an INSTALLABLE .apk (unlike android-release.yml, which builds a
# Play-Store .aab and uploads it to Google Play). The apk is attached as a run artifact.
#   variant=debug   -> `tauri android build --apk --debug`, auto-signed with the Android
#                      debug key, installable immediately, NO secrets required.
#   variant=release -> signed with the ANDROID_UPLOAD_KEY(+_ALIAS,+_PASSWORD) keystore
#                      secrets; for distributing to people.
# Note: the CrabNebula auto-updater is desktop-only — Android has no auto-update here.

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'debug (installable, no secrets) or release (signed with keystore)'
        type: choice
        options:
          - debug
          - release
        default: debug

jobs:
  apk:
    name: Build APK (${{ inputs.variant }})
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android/sdk/ndk/27*
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/share/boost
          sudo docker system prune -af || true
          df -h

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2
        with:
          api-level: 36
          build-tools: 36.0.0
          ndk-version: 26.1.10909125

      - name: Export Android SDK/NDK environment
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          NDK_PATH="$ANDROID_SDK_ROOT/ndk/26.1.10909125"
          if [ ! -d "$NDK_PATH" ]; then
            NDK_PATH=$(ls -d "$ANDROID_SDK_ROOT/ndk/"* | head -1)
          fi
          echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "Using ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT ; NDK at $NDK_PATH"

      - name: Install Rust stable toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable
          cache: false
          rustflags: ''

      - name: Cache Cargo registry and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-
            ${{ runner.os }}-cargo-

      - name: Install Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android

      - name: Setup Android signing (release only)
        if: ${{ inputs.variant == 'release' }}
        env:
          ANDROID_UPLOAD_KEY: ${{ secrets.ANDROID_UPLOAD_KEY }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_UPLOAD_KEY" ] || [ -z "$ANDROID_UPLOAD_KEY_ALIAS" ] || [ -z "$ANDROID_UPLOAD_KEY_PASSWORD" ]; then
            echo "::error::release variant needs ANDROID_UPLOAD_KEY(+_ALIAS,+_PASSWORD) secrets"
            exit 1
          fi
          CLEAN_KEY=$(echo "$ANDROID_UPLOAD_KEY" | tr -d '[:space:]')
          echo "$CLEAN_KEY" | base64 --decode > src-tauri/gen/android/upload-keystore.jks
          cat > src-tauri/gen/android/signing.properties << EOF
          storeFile=../upload-keystore.jks
          storePassword=$ANDROID_UPLOAD_KEY_PASSWORD
          keyAlias=$ANDROID_UPLOAD_KEY_ALIAS
          keyPassword=$ANDROID_UPLOAD_KEY_PASSWORD
          EOF

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build
        env:
          VITE_THUNDERBOLT_CLOUD_URL: ${{ vars.VITE_THUNDERBOLT_CLOUD_URL }}
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Build Android APK
        env:
          RUSTC_WRAPPER: ''
          SCCACHE_DISABLE: '1'
          VITE_THUNDERBOLT_CLOUD_URL: ${{ vars.VITE_THUNDERBOLT_CLOUD_URL }}
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: |
          if [ "${{ inputs.variant }}" = "debug" ]; then
            bun tauri android build --apk --debug
          else
            bun tauri android build --apk
          fi

      - name: Find APK
        id: find_apk
        run: |
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "::error::no APK produced"
            find src-tauri/gen/android -name "*.apk" -type f || true
            exit 1
          fi
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          echo "📱 Built APK: $APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: thunderbolt-${{ inputs.variant }}-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          if-no-files-found: error
