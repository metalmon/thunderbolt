services:
  web:
    restart: unless-stopped
    # Fork web container: builds the frontend (demo/consumer/anonymous flags) and
    # serves it via nginx same-origin proxy for /v1 and /powersync. See
    # dev-local/docker/README-web-demo.md.
    build:
      context: ../
      dockerfile: dev-local/docker/web.Dockerfile
    depends_on:
      - backend
      - powersync
    ports:
      - "${WEB_PORT:-3000}:80"

  backend:
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    build:
      context: ../
      dockerfile: deploy/docker/backend.Dockerfile
    env_file:
      # Reuse the dev env (secrets, auth mode, CORS); in-network overrides below.
      - ../backend/.env
    environment:
      # backend/.env points at the host-mapped localhost:5433, unreachable from
      # inside the compose network — use the service-name host instead.
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      # Web-demo origin. All auth/callback/CORS/PowerSync URLs derive from
      # ${PUBLIC_URL} so the SPA, /v1, and /powersync are same-origin behind one
      # tunnel. Default localhost:3000 for local use; set PUBLIC_URL to the tunnel
      # URL for external access. POWERSYNC_URL is returned to the browser, so it
      # must be the public origin (not the internal service host).
      APP_URL: ${PUBLIC_URL:-http://localhost:3000}
      BETTER_AUTH_URL: ${PUBLIC_URL:-http://localhost:3000}
      TRUSTED_ORIGINS: ${PUBLIC_URL:-http://localhost:3000}
      CORS_ORIGINS: ${PUBLIC_URL:-http://localhost:3000}
      POWERSYNC_URL: ${PUBLIC_URL:-http://localhost:3000}/powersync
      AUTH_ALLOW_ANONYMOUS: "true"
    ports:
      - 8000:8000

  powersync:
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    image: docker.io/journeyapps/powersync-service:latest
    command: ["start", "-r", "unified"]
    volumes:
      - ./config/config.yaml:/config/config.yaml
    environment:
      POWERSYNC_CONFIG_PATH: /config/config.yaml
    ports:
      - 8080:8080

  postgres:
    image: docker.io/library/postgres:18-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=postgres
      - PGPORT=5432
    volumes:
      # postgres:18+ expects the volume mount at /var/lib/postgresql (without the /data
      # suffix); the image manages a version-specific subdirectory like 18/docker inside.
      # Mounting at /var/lib/postgresql/data — the postgres:17 default — makes 18+ refuse
      # to start with "(unused mount/volume)". See docker-library/postgres#1259.
      - pg_data:/var/lib/postgresql
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    command: ["postgres", "-c", "wal_level=logical"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
